<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seamrite Designs Magazine</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@800&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #050505; --accent: #7B61FF; --text: #fff; --dim: #888; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: "Inter", sans-serif; overflow-x: hidden; }
    .cover { min-height: 100vh; padding: 10vh 10%; display: flex; flex-direction: column; justify-content: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .eyebrow { font-family: "Space Grotesk"; font-weight: 800; font-size: 0.8rem; letter-spacing: 5px; color: var(--accent); text-transform: uppercase; margin-bottom: 20px; display: block; }
    h1 { font-family: "Space Grotesk"; font-size: clamp(3rem, 12vw, 7rem); line-height: 0.85; text-transform: uppercase; letter-spacing: -4px; margin-bottom: 30px; }
    .tagline { font-size: 1.1rem; color: var(--dim); max-width: 560px; line-height: 1.6; margin-bottom: 40px; }
    .divider { width: 60px; height: 3px; background: var(--accent); margin: 30px 0; }
    .desc { font-size: 1rem; color: rgba(255,255,255,0.7); max-width: 600px; line-height: 1.7; }
    .back-btn { display: inline-block; margin-top: 40px; padding: 12px 28px; border: 1px solid var(--accent); color: var(--accent); text-decoration: none; font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; font-weight: 700; transition: background 0.2s; }
    .back-btn:hover { background: var(--accent); color: #000; }
    footer { padding: 60px 10%; text-align: center; color: var(--dim); font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; border-top: 1px solid rgba(255,255,255,0.05); }
  </style>
</head>
<body>
  <div class="cover">
    <span class="eyebrow">DESIGN // ISSUE 01</span>
    <h1>Seamrite<br>Designs</h1>
    <div class="divider"></div>
    <p class="tagline">Design Intelligence</p>
    <p class="desc">Precision craft meets digital innovation. Seamrite Designs Magazine explores pattern-making, textile technology, and the future of fashion design.</p>
    <a href="../" class="back-btn">← Back to Site</a>
  </div>
  <footer>Empire Niche Network &nbsp;·&nbsp; Seamrite Designs Magazine &nbsp;·&nbsp; 2026</footer>
</body>
</html>
